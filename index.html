<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Portal | AI for Operators</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0B0C0B;--volt:#D5FF02;--white:#F5F5F3;--gray:#999;--dim:#555;--card:#141514;--border:#1E1F1E;--serif:'Instrument Serif',Georgia,serif;--sans:'Inter',system-ui,sans-serif}
body{background:var(--black);color:var(--white);font-family:var(--sans);font-weight:300;font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
.header{border-bottom:1px solid var(--border);padding:18px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;background:rgba(11,12,11,.95);backdrop-filter:blur(12px)}
.logo{font-family:var(--serif);font-size:19px;letter-spacing:-.02em}
.logo em{color:var(--volt);font-style:normal}
.user-bar{display:flex;align-items:center;gap:16px}
.user-email{font-size:13px;color:var(--dim)}
.logout-btn{color:var(--gray);font-size:12px;cursor:pointer;background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-family:var(--sans);transition:border-color .2s}
.logout-btn:hover{border-color:rgba(213,255,2,.3);color:var(--volt)}
.container{max-width:960px;margin:0 auto;padding:56px 32px 80px}
.welcome{margin-bottom:56px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--volt);margin-bottom:12px}
.welcome h1{font-family:var(--serif);font-size:clamp(36px,5vw,52px);line-height:1.08;letter-spacing:-.025em;margin-bottom:12px}
.welcome p{font-size:16px;color:var(--gray);max-width:540px}
.section{margin-bottom:52px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px 22px;display:flex;flex-direction:column;gap:10px;transition:border-color .25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--volt);opacity:0;transition:opacity .25s}
.card:hover{border-color:rgba(213,255,2,.25)}
.card:hover::before{opacity:1}
.card a.card-link{position:absolute;inset:0}
.card-icon{font-size:22px;line-height:1}
.card-title{font-family:var(--serif);font-size:21px;line-height:1.15;color:var(--white)}
.card-desc{font-size:13px;color:var(--gray);line-height:1.55}
.card-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--volt);border:1px solid rgba(213,255,2,.2);padding:3px 10px;border-radius:100px;margin-top:2px;width:fit-content}
.link-list{display:flex;flex-direction:column}
.link-row{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--border);gap:16px}
.link-row:first-child{border-top:1px solid var(--border)}
.link-row-left{display:flex;flex-direction:column;gap:3px}
.link-row-title{font-size:15px;font-weight:500;color:var(--white)}
.link-row-desc{font-size:13px;color:var(--gray)}
.link-row-btn{font-size:12px;font-weight:700;color:var(--black);background:var(--volt);padding:7px 16px;border-radius:100px;white-space:nowrap;flex-shrink:0;transition:opacity .2s}
.link-row-btn:hover{opacity:.85}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:rgba(213,255,2,.08);border:1px solid rgba(213,255,2,.2);color:var(--volt);padding:5px 12px;border-radius:100px;margin-bottom:24px}
@media(max-width:600px){.container{padding:40px 20px 60px}.header{padding:14px 20px}.cards{grid-template-columns:1fr}.user-email{display:none}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">AI for<em>Operators</em></div>
  <div class="user-bar">
    <span class="user-email" id="user-email"></span>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</header>

<main class="container">

  <div class="welcome">
    <div class="eyebrow">Member Portal</div>
    <h1 id="welcome-heading">Welcome back.</h1>
    <p id="access-desc">Loading…</p>
  </div>

  <!-- Courses -->
  <div class="section">
    <div class="section-label">Your Courses</div>
    <div class="cards" id="courses-grid">
      <div class="card">
        <a class="card-link" href="/cos-course/"></a>
        <div class="card-icon">🤖</div>
        <div class="card-title">AI Chief of Staff</div>
        <div class="card-desc">Build your own AI COS in 4 sessions. Email triage, voice calls, intelligence layer, and full autonomy.</div>
        <div class="card-tag">4 Sessions · Lifetime Access</div>
      </div>
    </div>
  </div>

  <!-- Community — mastermind only -->
  <div class="section" id="community-section" style="display:none">
    <div class="section-label">Community</div>
    <div class="link-list" id="community-links"></div>
  </div>

</main>

<script>
const AUTH_WORKER = 'https://cos-auth-worker.russ-2da.workers.dev';

const COMMUNITY_LINKS = [
  {
    title: 'Private Telegram Community',
    desc: 'Async discussion, tool reviews, wins, and questions — the core of the mastermind.',
    url: 'https://t.me/placeholder',
    btn: 'Open Telegram →'
  },
  {
    title: 'Monthly Mastermind Call',
    desc: 'Live call with Russ — building in the open, what\'s working, what\'s not. Times posted in Telegram.',
    url: 'https://t.me/placeholder',
    btn: 'See Schedule →'
  },
  {
    title: 'AI for Operators — What\'s Next',
    desc: 'Roadmap, upcoming courses, and what\'s coming in the mastermind.',
    url: '/cos-course/whats-next.html',
    btn: 'View →'
  },
];

async function init() {
  try {
    const res = await fetch(`${AUTH_WORKER}/auth/check`, { credentials: 'include' });
    const data = await res.json();

    if (!data.authenticated || data.access === 'none') {
      window.location.href = '/login.html';
      return;
    }

    const email = data.email || '';
    const firstName = email.split('@')[0].split('.')[0];
    document.getElementById('user-email').textContent = email;
    document.getElementById('welcome-heading').textContent = `Welcome back${firstName ? ', ' + firstName.charAt(0).toUpperCase() + firstName.slice(1) : ''}.`;

    if (data.access === 'mastermind') {
      document.getElementById('access-desc').textContent = 'You have full mastermind access — all courses, group calls, and the private community.';
      document.getElementById('community-section').style.display = '';
      renderCommunity();
    } else if (data.access === 'course') {
      document.getElementById('access-desc').textContent = 'You have lifetime access to the AI Chief of Staff course.';
    }

  } catch (e) {
    window.location.href = '/login.html';
  }
}

function renderCommunity() {
  const container = document.getElementById('community-links');
  container.innerHTML = COMMUNITY_LINKS.map(item => `
    <div class="link-row">
      <div class="link-row-left">
        <div class="link-row-title">${item.title}</div>
        <div class="link-row-desc">${item.desc}</div>
      </div>
      <a href="${item.url}" target="_blank" class="link-row-btn">${item.btn}</a>
    </div>
  `).join('');
}

async function logout() {
  await fetch(`${AUTH_WORKER}/auth/logout`, { method: 'POST', credentials: 'include' }).catch(() => {});
  window.location.href = '/login.html';
}

init();
</script>
</body>
</html>
