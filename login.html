<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | AI Chief of Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0B0C0B;--volt:#D5FF02;--white:#F5F5F3;--gray:#999;--dim:#555;--card:#141514;--border:#1E1F1E;--serif:'Instrument Serif',Georgia,serif;--sans:'Inter',system-ui,sans-serif}
html,body{height:100%}
body{background:var(--black);color:var(--white);font-family:var(--sans);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;-webkit-font-smoothing:antialiased}
.logo{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--white);margin-bottom:48px;letter-spacing:-.02em}
.logo span{color:var(--volt);font-style:normal}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:400px}
h1{font-family:var(--serif);font-size:28px;line-height:1.1;letter-spacing:-.02em;margin-bottom:8px}
.sub{font-size:14px;color:var(--gray);line-height:1.55;margin-bottom:32px}
label{display:block;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:8px}
input[type=email]{width:100%;background:#0a0b0a;border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--white);font-size:15px;font-family:var(--sans);outline:none;transition:border-color .2s;margin-bottom:16px}
input[type=email]:focus{border-color:rgba(213,255,2,.4)}
input[type=email]::placeholder{color:var(--dim)}
button{width:100%;background:var(--volt);color:var(--black);border:none;border-radius:100px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:opacity .2s;letter-spacing:.02em}
button:hover{opacity:.88}
button:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:14px;text-align:center;margin-top:20px;line-height:1.6;min-height:24px}
.msg.success{color:var(--volt)}
.msg.error{color:#ff6b6b}
.divider{border:none;border-top:1px solid var(--border);margin:28px 0}
.purchase-link{text-align:center;font-size:13px;color:var(--gray);line-height:1.6}
.purchase-link a{color:var(--volt);font-weight:600}
.error-banner{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:10px;padding:12px 16px;font-size:13px;color:#ff9a9a;margin-bottom:20px;display:none}
</style>
</head>
<body>

<a class="logo" href="/">AI Chief of<span>Staff</span></a>

<div class="card">
  <h1>Welcome back.</h1>
  <p class="sub">Enter your email and we'll send you a one-click login link.</p>

  <div class="error-banner" id="error-banner"></div>

  <form id="login-form">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" autofocus>
    <button type="submit" id="submit-btn">Send Login Link →</button>
  </form>

  <p class="msg" id="msg"></p>

  <hr class="divider">

  <p class="purchase-link">
    Not enrolled yet?<br>
    <a href="https://buy.stripe.com/00w5kF7fIbg6g9YemrbEA02" target="_blank">Get the Course ($199) →</a>
    &nbsp;·&nbsp;
    <a href="https://buy.stripe.com/eVqfZj8jMesi1f42DJbEA03" target="_blank">Join the Mastermind →</a>
  </p>
</div>

<script>
const AUTH_WORKER = 'https://cos-auth-worker.russ-2da.workers.dev';

// Show error from URL param
const params = new URLSearchParams(location.search);
const err = params.get('error');
if (err) {
  const banner = document.getElementById('error-banner');
  banner.style.display = 'block';
  const msgs = {
    'expired': 'Your login link expired. Request a new one below.',
    'invalid': 'That login link isn\'t valid. Try again.',
    'not-enrolled': 'That email isn\'t enrolled. Purchase below to get access.',
  };
  banner.textContent = msgs[err] || 'Something went wrong. Try again.';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('msg');

  btn.disabled = true;
  btn.textContent = 'Sending…';
  msg.className = 'msg';
  msg.textContent = '';

  try {
    const res = await fetch(`${AUTH_WORKER}/auth/magic-link`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    msg.className = 'msg success';
    msg.textContent = '✓ Check your email — link is on its way.';
    btn.textContent = 'Link Sent!';
  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = 'Something went wrong. Try again.';
    btn.disabled = false;
    btn.textContent = 'Send Login Link →';
  }
});

// If already has session, redirect
async function checkSession() {
  try {
    const res = await fetch(`${AUTH_WORKER}/auth/check`, { credentials: 'include' });
    const data = await res.json();
    if (data.authenticated && data.access !== 'none') {
      const dest = data.access === 'mastermind' ? '/' : '/cos-course/';
      window.location.href = dest;
    }
  } catch(e) {}
}
checkSession();
</script>
</body>
</html>
